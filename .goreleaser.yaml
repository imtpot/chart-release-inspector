version: 2

project_name: chart-release-inspector

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: chart-release-inspector
    main: ./cmd/chart-release-inspector
    binary: chart-release-inspector
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  format: "- {{ .Message }}"